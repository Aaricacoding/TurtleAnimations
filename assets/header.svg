<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700">
        <animate attributeName="stop-color"
                 values="#FFD700;#FFA500;#ADFF2F;#FFD700"
                 dur="6s"
                 repeatCount="indefinite"/>
      </stop>

      <stop offset="50%" stop-color="#FFA500">
        <animate attributeName="stop-color"
                 values="#FFA500;#ADFF2F;#FFD700;#FFA500"
                 dur="6s"
                 repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#ADFF2F">
        <animate attributeName="stop-color"
                 values="#ADFF2F;#FFD700;#FFA500;#ADFF2F"
                 dur="6s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wave motion -->
    <linearGradient id="waveOverlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
      <animateTransform attributeName="gradientTransform"
                        type="translate"
                        from="-1 0"
                        to="1 0"
                        dur="4s"
                        repeatCount="indefinite"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117"/>

  <!-- Moving wave lines -->
  <path d="M0,110 Q250,40 500,110 T1000,110"
        stroke="url(#flowGrad)"
        stroke-width="3"
        fill="none"
        filter="url(#glow)">
    <animate attributeName="d"
             values="
             M0,110 Q250,40 500,110 T1000,110;
             M0,110 Q250,180 500,110 T1000,110;
             M0,110 Q250,40 500,110 T1000,110"
             dur="5s"
             repeatCount="indefinite"/>
  </path>

  <!-- Second wave -->
  <path d="M0,140 Q250,200 500,140 T1000,140"
        stroke="url(#flowGrad)"
        stroke-width="2"
        opacity="0.6"
        fill="none">
    <animate attributeName="d"
             values="
             M0,140 Q250,200 500,140 T1000,140;
             M0,140 Q250,80 500,140 T1000,140;
             M0,140 Q250,200 500,140 T1000,140"
             dur="6s"
             repeatCount="indefinite"/>
  </path>

  <!-- Text -->
  <text x="50%" y="55%"
        text-anchor="middle"
        font-size="52"
        font-family="monospace"
        font-weight="bold"
        fill="url(#flowGrad)"
        filter="url(#glow)">
    TURTLE ANIMATIONS
  </text>

</svg>