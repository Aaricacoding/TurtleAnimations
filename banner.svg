<svg viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" width="860" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');

      .bg { fill: #0d1117; }

      /* ── title letters animate in one by one ── */
      .title { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 52px; fill: url(#titleGrad); letter-spacing: 6px; }
      .sub   { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 15px; fill: #8be9fd; letter-spacing: 4px; opacity: 0; }

      /* letter reveal */
      .t1{animation: fadeUp 0.4s 0.1s forwards ease-out;}
      .t2{animation: fadeUp 0.4s 0.2s forwards ease-out;}
      .t3{animation: fadeUp 0.4s 0.3s forwards ease-out;}
      .t4{animation: fadeUp 0.4s 0.4s forwards ease-out;}
      .t5{animation: fadeUp 0.4s 0.5s forwards ease-out;}
      .t6{animation: fadeUp 0.4s 0.6s forwards ease-out;}
      .t7{animation: fadeUp 0.4s 0.7s forwards ease-out;}
      .t8{animation: fadeUp 0.4s 0.8s forwards ease-out;}
      .t9{animation: fadeUp 0.4s 0.9s forwards ease-out;}
      .t10{animation: fadeUp 0.4s 1.0s forwards ease-out;}
      .t11{animation: fadeUp 0.4s 1.1s forwards ease-out;}
      .t12{animation: fadeUp 0.4s 1.2s forwards ease-out;}
      .t13{animation: fadeUp 0.4s 1.3s forwards ease-out;}
      .t14{animation: fadeUp 0.4s 1.4s forwards ease-out;}
      .t15{animation: fadeUp 0.4s 1.5s forwards ease-out;}
      .t16{animation: fadeUp 0.4s 1.6s forwards ease-out;}

      /* subtitle fade */
      .sub { animation: fadeIn 1s 2s forwards ease-out; }

      /* sparkles */
      .sp { animation: sparkle 2.5s infinite ease-in-out; fill: #f8f8f2; }
      .sp1{animation-delay:0s;}   .sp2{animation-delay:0.4s;} .sp3{animation-delay:0.8s;}
      .sp4{animation-delay:1.2s;} .sp5{animation-delay:1.6s;} .sp6{animation-delay:2.0s;}
      .sp7{animation-delay:0.2s;} .sp8{animation-delay:0.6s;} .sp9{animation-delay:1.0s;}
      .sp10{animation-delay:1.4s;}.sp11{animation-delay:1.8s;}.sp12{animation-delay:2.2s;}

      /* orbit ring */
      .ring { animation: spin 8s linear infinite; transform-origin: 430px 95px; }
      .ring2{ animation: spin 12s linear infinite reverse; transform-origin: 430px 95px; }

      /* underline shimmer */
      .uline { animation: shimmer 3s linear infinite; }

      @keyframes fadeUp {
        from { opacity:0; transform: translateY(18px); }
        to   { opacity:1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity:0; } to { opacity:1; }
      }
      @keyframes sparkle {
        0%,100% { opacity:0; transform:scale(0.4); }
        50%      { opacity:1; transform:scale(1.1); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes shimmer {
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -860; }
      }

      /* each letter starts invisible */
      .tl { opacity:0; }
    </style>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff79c6"/>
      <stop offset="25%"  stop-color="#bd93f9"/>
      <stop offset="50%"  stop-color="#8be9fd"/>
      <stop offset="75%"  stop-color="#50fa7b"/>
      <stop offset="100%" stop-color="#ffb86c"/>
    </linearGradient>

    <linearGradient id="uGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff79c6" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#bd93f9"/>
      <stop offset="60%"  stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect class="bg" width="860" height="220" rx="14"/>

  <!-- subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="55"  x2="860" y2="55"/>
    <line x1="0" y1="110" x2="860" y2="110"/>
    <line x1="0" y1="165" x2="860" y2="165"/>
    <line x1="215" y1="0" x2="215" y2="220"/>
    <line x1="430" y1="0" x2="430" y2="220"/>
    <line x1="645" y1="0" x2="645" y2="220"/>
  </g>

  <!-- outer decorative orbit rings -->
  <g class="ring">
    <ellipse cx="430" cy="95" rx="390" ry="28" fill="none" stroke="#bd93f920" stroke-width="1" stroke-dasharray="6 8"/>
  </g>
  <g class="ring2">
    <ellipse cx="430" cy="95" rx="370" ry="20" fill="none" stroke="#8be9fd18" stroke-width="1" stroke-dasharray="3 12"/>
  </g>

  <!-- ══ TURTLE ANIMATIONS  — letter by letter ══ -->
  <!-- T -->
  <text class="tl t1"  x="32"  y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">T</text>
  <text class="tl t2"  x="73"  y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">U</text>
  <text class="tl t3"  x="116" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">R</text>
  <text class="tl t4"  x="158" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">T</text>
  <text class="tl t5"  x="196" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">L</text>
  <text class="tl t6"  x="232" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">E</text>

  <!-- space gap, then ANIMATIONS -->
  <text class="tl t7"  x="300" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">A</text>
  <text class="tl t8"  x="342" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">N</text>
  <text class="tl t9"  x="387" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">I</text>
  <text class="tl t10" x="405" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">M</text>
  <text class="tl t11" x="456" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">A</text>
  <text class="tl t12" x="498" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">T</text>
  <text class="tl t13" x="537" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">I</text>
  <text class="tl t14" x="555" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">O</text>
  <text class="tl t15" x="601" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">N</text>
  <text class="tl t16" x="647" y="118" class="title" font-family="'Orbitron',monospace" font-weight="900" font-size="52" fill="url(#titleGrad)" letter-spacing="0">S</text>

  <!-- shimmer underline -->
  <line x1="30" y1="130" x2="830" y2="130" stroke="url(#uGrad)" stroke-width="2"
        stroke-dasharray="860" stroke-dashoffset="860" class="uline"/>

  <!-- subtitle -->
  <text class="sub" x="430" y="162" text-anchor="middle"
        font-family="'Orbitron',monospace" font-size="13" fill="#8be9fd" letter-spacing="4">
    ✦  WHERE  MATHEMATICS  BECOMES  ART  ✦
  </text>

  <!-- ══ SPARKLES scattered around ══ -->
  <!-- top row -->
  <g class="sp sp1"  transform="translate(55,28)">  <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#ff79c6"/></g>
  <g class="sp sp2"  transform="translate(180,18)"> <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#bd93f9"/></g>
  <g class="sp sp3"  transform="translate(340,22)"> <polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1"                 fill="#8be9fd"/></g>
  <g class="sp sp4"  transform="translate(480,15)"> <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#50fa7b"/></g>
  <g class="sp sp5"  transform="translate(650,25)"> <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#ffb86c"/></g>
  <g class="sp sp6"  transform="translate(800,18)"> <polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1"                 fill="#ff79c6"/></g>
  <!-- bottom row -->
  <g class="sp sp7"  transform="translate(20,185)"> <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#ffb86c"/></g>
  <g class="sp sp8"  transform="translate(130,195)"><polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1"                 fill="#50fa7b"/></g>
  <g class="sp sp9"  transform="translate(270,188)"><polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#8be9fd"/></g>
  <g class="sp sp10" transform="translate(430,200)"><polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#ff79c6"/></g>
  <g class="sp sp11" transform="translate(600,192)"><polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1"                 fill="#bd93f9"/></g>
  <g class="sp sp12" transform="translate(760,185)"><polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#50fa7b"/></g>

  <!-- corner accent dots -->
  <circle cx="18"  cy="18"  r="3" fill="#ff79c650"/>
  <circle cx="842" cy="18"  r="3" fill="#50fa7b50"/>
  <circle cx="18"  cy="202" r="3" fill="#8be9fd50"/>
  <circle cx="842" cy="202" r="3" fill="#ffb86c50"/>
</svg>
